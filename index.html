<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>English Dictionary</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#0b0b0b;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.app{

    width:100%;
    max-width:430px;

    background:#171717;

    border-radius:25px;

    padding:30px;

    box-shadow:0 20px 60px rgba(0,0,0,.6);

    border:1px solid #2c2c2c;

}

.logo{

    text-align:center;

    color:#FFD54A;

    font-size:34px;

    font-weight:bold;

    letter-spacing:2px;

}

.sub{

    text-align:center;

    color:#888;

    margin-top:8px;

    margin-bottom:35px;

}

input{

    width:100%;

    padding:18px;

    background:#111;

    border:1px solid #333;

    color:white;

    font-size:18px;

    border-radius:15px;

    outline:none;

}

input:focus{

    border:1px solid #FFD54A;

}

button{

    width:100%;

    margin-top:18px;

    padding:18px;

    border:none;

    border-radius:15px;

    background:#FFD54A;

    color:#111;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    transition:.2s;

}

button:hover{

    transform:scale(1.02);

}

.resultado{

    margin-top:25px;

    background:#111;

    border:1px solid #333;

    border-radius:15px;

    padding:25px;

    color:white;

    font-size:22px;

    text-align:center;

    min-height:80px;

    display:flex;

    align-items:center;

    justify-content:center;

}

footer{

    text-align:center;

    color:#555;

    margin-top:25px;

    font-size:13px;

}

</style>

</head>

<body>

<div class="app">

<div class="logo">
ENGLISH
</div>

<div class="sub">
Dicionário Inglês → Português
</div>

<input
id="palavra"
placeholder="Digite uma palavra em inglês">

<button onclick="traduzir()">
TRADUZIR
</button>

<div
class="resultado"
id="resultado">

Digite uma palavra...

</div>

<footer>

Powered by LibreTranslate

</footer>

</div>

<script>

async function traduzir(){

const palavra=document.getElementById("palavra").value.trim();

const resultado=document.getElementById("resultado");

if(palavra===""){

resultado.innerHTML="Digite uma palavra.";

return;

}

resultado.innerHTML="Traduzindo...";

try{

const resposta=await fetch("https://translate.argosopentech.com/translate",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

q:palavra,

source:"en",

target:"pt",

format:"text"

})

});

const dados=await resposta.json();

resultado.innerHTML=dados.translatedText;

}catch(e){

resultado.innerHTML="Erro ao conectar à API.";

}

}

document.getElementById("palavra").addEventListener("keypress",function(e){

if(e.key==="Enter"){

traduzir();

}

});

</script>

</body>

</html>
