<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>English Dictionary</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#0d0d0d;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:430px;
    background:#1a1a1a;
    border-radius:20px;
    padding:30px;
    border:1px solid #333;
}

h1{
    text-align:center;
    color:#ffd84d;
    margin-bottom:10px;
}

p{
    text-align:center;
    color:#888;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:16px;
    border-radius:12px;
    border:1px solid #444;
    background:#111;
    color:white;
    font-size:18px;
}

button{
    width:100%;
    margin-top:15px;
    padding:16px;
    border:none;
    border-radius:12px;
    background:#ffd84d;
    color:#111;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

#resultado{
    margin-top:25px;
    background:#111;
    border:1px solid #333;
    border-radius:12px;
    padding:20px;
    min-height:120px;
    line-height:1.6;
}

small{
    display:block;
    margin-top:20px;
    text-align:center;
    color:#666;
}
</style>

</head>

<body>

<div class="container">

<h1>English</h1>

<p>Dicionário Inglês → Português</p>

<input
id="palavra"
type="text"
placeholder="Digite uma palavra">

<button onclick="buscar()">
Pesquisar
</button>

<div id="resultado">

Digite uma palavra.

</div>

<small>Powered by Free Dictionary API</small>

</div>

<script>

async function buscar(){

const palavra=document.getElementById("palavra").value.trim();

const resultado=document.getElementById("resultado");

if(!palavra){

resultado.innerHTML="Digite uma palavra.";

return;

}

resultado.innerHTML="Pesquisando...";

try{

const resposta=await fetch("https://api.dictionaryapi.dev/api/v2/entries/en/"+encodeURIComponent(palavra));

if(!resposta.ok){

resultado.innerHTML="Palavra não encontrada.";

return;

}

const dados=await resposta.json();

const item=dados[0];

let html="";

html+="<b>Palavra:</b> "+item.word+"<br><br>";

if(item.phonetic){

html+="<b>Pronúncia:</b> "+item.phonetic+"<br><br>";

}

item.meanings.forEach(function(m){

html+="<b>"+m.partOfSpeech+"</b><br>";

m.definitions.slice(0,2).forEach(function(d){

html+="• "+d.definition+"<br>";

});

html+="<br>";

});

resultado.innerHTML=html;

}catch(e){

resultado.innerHTML="Erro ao consultar o dicionário.";

}

}

document.getElementById("palavra").addEventListener("keydown",function(e){

if(e.key==="Enter"){

buscar();

}

});

</script>

</body>
</html>
