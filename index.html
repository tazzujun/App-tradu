<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dicionário Inglês PT</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
body{background:#080808;color:#fff;min-height:100vh;padding:22px;display:flex;justify-content:center;align-items:center}
.app{width:100%;max-width:430px;background:#151515;border:1px solid #333;border-radius:22px;padding:26px}
h1{text-align:center;color:#f5c542;margin-bottom:8px}
p{text-align:center;color:#aaa;margin-bottom:24px}
input{width:100%;padding:17px;border-radius:14px;border:1px solid #444;background:#0b0b0b;color:#fff;font-size:18px}
button{width:100%;padding:17px;margin-top:14px;border:0;border-radius:14px;background:#f5c542;color:#111;font-weight:bold;font-size:18px}
.resultado{margin-top:22px;background:#0b0b0b;border:1px solid #333;border-radius:14px;padding:22px;text-align:center;font-size:24px;min-height:100px;display:flex;align-items:center;justify-content:center;line-height:1.4}
.sugestoes{margin-top:15px;text-align:center;color:#aaa}
.tag{display:inline-block;margin:5px;padding:8px 12px;border-radius:20px;background:#222;border:1px solid #444;color:#eee}
</style>
</head>

<body>

<div class="app">
<h1>ENGLISH</h1>
<p>Dicionário Inglês → Português</p>

<input id="palavra" placeholder="Digite em inglês" autocomplete="off">
<button onclick="traduzir()">TRADUZIR</button>

<div class="resultado" id="resultado">Carregando...</div>
<div class="sugestoes" id="sugestoes"></div>
</div>

<script>
let dicionario = {};

async function carregar(){
  try{
    const r = await fetch("./dicionario.json?v=999");
    dicionario = await r.json();
    document.getElementById("resultado").innerHTML = "Digite uma palavra.";
  }catch(e){
    document.getElementById("resultado").innerHTML = "Erro ao carregar dicionário.";
  }
}

function limpar(texto){
  return texto.toLowerCase().trim();
}

function traduzir(){
  let palavra = limpar(document.getElementById("palavra").value);
  const resultado = document.getElementById("resultado");
  const sugestoes = document.getElementById("sugestoes");

  sugestoes.innerHTML = "";

  if(!palavra){
    resultado.innerHTML = "Digite uma palavra.";
    return;
  }

  let busca = palavra;

  if(dicionario[busca]){
    mostrar(busca, dicionario[busca]);
    return;
  }

  if(busca.endsWith("ing")){
    let base = busca.slice(0,-3);
    if(dicionario[base]){
      mostrar(busca, dicionario[base]);
      return;
    }
  }

  if(busca.endsWith("ed")){
    let base = busca.slice(0,-2);
    if(dicionario[base]){
      mostrar(busca, dicionario[base]);
      return;
    }
  }

  if(busca.endsWith("s")){
    let base = busca.slice(0,-1);
    if(dicionario[base]){
      mostrar(busca, dicionario[base]);
      return;
    }
  }

  const parecidas = Object.keys(dicionario)
    .filter(p => p.includes(busca) || p.startsWith(busca))
    .slice(0,10);

  resultado.innerHTML = "Palavra não encontrada.";

  if(parecidas.length){
    sugestoes.innerHTML = "Sugestões:<br>" + parecidas.map(p =>
      `<span class="tag" onclick="usar('${p}')">${p}</span>`
    ).join("");
  }
}

function mostrar(palavra, traducao){
  document.getElementById("resultado").innerHTML =
    `<div><b>${palavra}</b><br><br>${traducao}</div>`;
}

function usar(p){
  document.getElementById("palavra").value = p;
  traduzir();
}

document.getElementById("palavra").addEventListener("keydown", e => {
  if(e.key === "Enter") traduzir();
});

carregar();
</script>

</body>
</html>
